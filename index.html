<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛主席语录 · 抽卡</title>
<style>
:root {
  --red: #c62828; --gold: #d4a017; --gold-light: #f0d060;
  --bg: #0d0d14; --card-w: 280px; --card-h: 400px;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  overflow-x:hidden;color:#fff;position:relative;
}

.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,#c6282820 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}

.canvas-bg{position:fixed;inset:0;pointer-events:none;z-index:0}

main{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:36px}

.title-area{text-align:center}
.title-area h1{font-size:40px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(180deg,#f0d060,#d4a017,#b8860b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 8px #d4a01744)}
.title-area .sub{font-size:13px;color:#ffffff66;letter-spacing:6px;margin-top:6px}

/* Deck */
.deck-area{position:relative;width:var(--card-w);height:var(--card-h);perspective:1200px}
.deck-card{position:absolute;width:100%;height:100%;border-radius:14px;
  background:linear-gradient(145deg,#8b0000,#5a0000);border:2px solid var(--gold);
  box-shadow:0 4px 30px #00000088;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.deck-card:nth-child(1){transform:rotate(-3deg)}
.deck-card:nth-child(2){transform:rotate(1deg) translateY(4px)}
.deck-card:nth-child(3){transform:rotate(5deg) translateY(8px)}
.deck-card .inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.deck-card .s{font-size:11px;color:var(--gold);letter-spacing:4px;opacity:.5}
.deck-card .p{width:90px;height:110px;border:2px solid #d4a01766;border-radius:6px;margin:12px 0;background:#3a0000;overflow:hidden;display:flex;align-items:center;justify-content:center}
.deck-card .p img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:drop-shadow(0 0 10px #d4a01766)}
.deck-card .pf{font-size:48px;color:var(--gold);opacity:.6}
.deck-card .n{color:var(--gold);font-size:20px;letter-spacing:6px;font-weight:700;margin-top:4px}
.deck-card .t{color:#cc8800;font-size:12px;letter-spacing:3px;margin-top:2px}

.deck-area:hover .deck-card:nth-child(1){transform:rotate(-5deg) translateY(-6px)}
.deck-area:hover .deck-card:nth-child(2){transform:rotate(2deg) translateY(-3px)}
.deck-area:hover .deck-card:nth-child(3){transform:rotate(7deg) translateY(0px)}

/* Buttons */
.draw-btn{
  position:relative;padding:16px 60px;font-size:20px;font-weight:700;letter-spacing:6px;
  border:none;border-radius:50px;cursor:pointer;
  background:linear-gradient(135deg,#d4a017,#b8860b);color:#1a1a1a;
  box-shadow:0 0 30px #d4a01733,0 4px 20px #00000088;
  transition:all .3s;overflow:hidden
}
.draw-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,#fff3 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .6s}
.draw-btn:hover::after{transform:translateX(100%)}
.draw-btn:hover{transform:translateY(-3px);box-shadow:0 0 50px #d4a01755,0 8px 30px #00000088}
.draw-btn:active{transform:translateY(0)}
.draw-btn:disabled{opacity:.4;pointer-events:none}

.ctrl-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center}
.draw-btn.small{padding:12px 32px;font-size:14px;letter-spacing:3px}

/* Drawn cards container */
.drawn-cards{position:fixed;inset:0;pointer-events:none;z-index:10}
.drawn-cards .dc{position:absolute;width:var(--card-w);height:var(--card-h);perspective:1200px;pointer-events:auto;opacity:0;cursor:pointer;will-change:transform,top,left}
.drawn-cards .dc.visible{opacity:1}
.drawn-cards .dc .ci{position:relative;width:100%;height:100%;transition:transform .9s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.drawn-cards .dc.flipped .ci{transform:rotateY(180deg)}
.dc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.dc-back{background:linear-gradient(145deg,#8b0000,#5a0000);border:2px solid var(--gold);
  align-items:center;justify-content:center;padding:24px;text-align:center;
  box-shadow:0 0 60px #d4a01722,0 8px 40px #000000cc}
.dc-back .s{font-size:11px;color:var(--gold);letter-spacing:4px;opacity:.5}
.dc-back .p{width:90px;height:110px;border:2px solid #d4a01766;border-radius:6px;margin:12px 0;background:#3a0000;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dc-back .p img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:drop-shadow(0 0 10px #d4a01766)}
.dc-back .pf{font-size:48px;color:var(--gold);opacity:.6}
.dc-back .n{color:var(--gold);font-size:20px;letter-spacing:6px;font-weight:700;margin-top:4px}
.dc-back .t{color:#cc8800;font-size:12px;letter-spacing:3px;margin-top:2px}

.dc-front{background:linear-gradient(160deg,#1a1520,#1a0f0f);border:2px solid var(--gold);
  transform:rotateY(180deg);padding:30px 24px;justify-content:center;
  box-shadow:0 0 80px #d4a01733,0 8px 40px #000000cc}
.dc-front .ql{color:var(--gold);opacity:.35;font-size:36px;line-height:1;margin-bottom:2px}
.dc-front .qr{color:var(--gold);opacity:.35;font-size:36px;line-height:1;text-align:right;margin-top:2px}
.dc-front .qt{flex:1;font-size:17px;line-height:1.9;color:#e8dcc8;overflow-y:auto;padding:4px 0;text-align:justify}
.dc-front .qs{margin-top:14px;padding-top:12px;border-top:1px solid #ffffff10;font-size:12px;color:var(--gold-light);line-height:1.6;opacity:.85}
.dc-front .tap{font-size:10px;color:#ffffff44;text-align:center;margin-top:8px;letter-spacing:1px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}

/* Explanation overlay */
.explain-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:#000000dd;backdrop-filter:blur(8px)}
.explain-overlay.active{display:flex}
.explain-box{background:linear-gradient(160deg,#1a1520,#2a1010);border:2px solid var(--gold);
  border-radius:16px;padding:30px;max-width:440px;width:90%;position:relative;box-shadow:0 0 60px #d4a01733;animation:popIn .3s ease-out}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.explain-box h2{color:var(--gold);font-size:18px;margin-bottom:8px;letter-spacing:3px}
.explain-box .eq{font-size:15px;color:#e8dcc8;line-height:1.8;margin-bottom:20px;padding:16px;background:#ffffff06;border-radius:8px;border-left:3px solid var(--gold)}
.explain-box .ee{font-size:13px;color:#ccc;line-height:1.8}
.explain-box .close-btn{position:absolute;top:12px;right:16px;width:36px;height:36px;border-radius:50%;
  background:transparent;border:1px solid #ffffff33;color:#fff;font-size:20px;cursor:pointer;transition:all .3s;line-height:36px;text-align:center}
.explain-box .close-btn:hover{border-color:var(--gold);color:var(--gold)}

/* History */
.history{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;min-height:32px}
.history .chip{padding:6px 14px;border-radius:14px;font-size:12px;cursor:pointer;
  background:#ffffff08;border:1px solid #ffffff15;color:#aa9966;transition:all .3s;
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history .chip:hover{background:#d4a01715;border-color:#d4a01744;color:var(--gold-light)}

.particle{position:fixed;pointer-events:none;z-index:99}
.confetti{position:fixed;pointer-events:none;z-index:98}

footer{position:relative;z-index:1;margin-top:40px;color:#ffffff22;font-size:12px;letter-spacing:2px}

@media(max-width:500px){
  :root{--card-w:240px;--card-h:340px}
  .title-area h1{font-size:28px;letter-spacing:4px}
  .dc-front .qt{font-size:15px}
  .draw-btn{padding:14px 40px;font-size:16px}
  .draw-btn.small{padding:10px 22px;font-size:12px}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<canvas class="canvas-bg" id="bgCanvas"></canvas>

<main>
  <div class="title-area">
    <h1>毛 泽 东 语 录</h1>
    <div class="sub">— 迷茫时，抽一张卡片汲取力量 —</div>
  </div>

  <div class="deck-area" id="deck">
    <div class="deck-card"><div class="inner"><span class="s">★ ★ ★ ★ ★</span><div class="p"><span class="pf">✦</span></div><span class="n">毛泽东</span><span class="t">— 语录 —</span></div></div>
    <div class="deck-card"><div class="inner"><span class="s">★ ★ ★ ★ ★</span><div class="p"><span class="pf">✦</span></div><span class="n">毛泽东</span><span class="t">— 语录 —</span></div></div>
    <div class="deck-card"><div class="inner"><span class="s">★ ★ ★ ★ ★</span><div class="p"><span class="pf">✦</span></div><span class="n">毛泽东</span><span class="t">— 语录 —</span></div></div>
  </div>

  <div class="drawn-cards" id="drawnCards"></div>

  <div class="ctrl-row">
    <button class="draw-btn small" onclick="drawOne()">再抽一张</button>
    <button class="draw-btn" id="mainBtn" onclick="drawOne()">抽 卡</button>
    <button class="draw-btn small" onclick="drawFive()">连抽五张</button>
  </div>

  <div class="history" id="history"></div>
</main>

<footer id="quoteCount">卡片数据加载中…</footer>

<div class="explain-overlay" id="explainOverlay" onclick="closeExplain(event)">
  <div class="explain-box" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeExplain()">✕</button>
    <h2>释义</h2>
    <div class="eq" id="explainQuote"></div>
    <div class="ee" id="explainText"></div>
  </div>
</div>

<script>
// ===== Quotes with explanations =====
const QUOTES = [
{q:"星星之火，可以燎原",s:"《星星之火，可以燎原》(1930年1月)",e:"比喻新生事物开始时虽然力量微小，但有旺盛的生命力和广阔的发展前途。在革命处于低潮、悲观情绪蔓延时，毛泽东以此激励同志们看到希望，坚信革命的力量必将壮大。"},
{q:"革命不是请客吃饭，不是做文章，不是绘画绣花，不能那样雅致，那样从容不迫，文质彬彬，那样温良恭俭让。革命是暴动，是一个阶级推翻一个阶级的暴烈的行动",s:"《湖南农民运动考察报告》(1927年3月)",e:"强调革命的本质是激烈的阶级斗争，不能用温和改良的手段代替革命。面对重重压迫，只有敢于斗争，才能真正改变被压迫者的命运。"},
{q:"矫枉必须过正，不过正不能矫枉",s:"《湖南农民运动考察报告》(1927年3月)",e:"要终结旧的封建秩序，必须用彻底的革命方法而非渐进改良。破除根深蒂固的旧制度，有时需要超出常规力度。"},
{q:"没有调查就没有发言权",s:"《〈农村调查〉的序言和跋》(1941年3月)",e:"一切结论产生于调查情况的末尾而非开头。不做调查就乱发议论，十个有十个要失败。这是实事求是思想路线的核心——从实际出发，而非从主观想象出发。"},
{q:"全心全意为人民服务",s:"《论联合政府》(1945年4月)",e:"这是我们党和军队的根本宗旨。一切工作的出发点和落脚点，都应当是人民的利益。这五个字是检验所有行为的最高标准。"},
{q:"人总是要死的，但死的意义有不同。为人民利益而死，就比泰山还重",s:"《为人民服务》(1944年9月)",e:"生命的价值不在于长短，而在于为了什么。把有限的生命投入到为人民服务的事业中，这样的死就重于泰山。这既是对张思德的悼念，也是对所有人的激励。"},
{q:"因为我们是为人民服务的，所以，我们如果有缺点，就不怕别人批评指出",s:"《为人民服务》(1944年9月)",e:"真正有底气的人不怕批评。凡是符合人民利益的就坚持，不符合的就改正——这种胸怀和态度，是个人和组织持续进步的保证。"},
{q:"我们都是来自五湖四海，为了一个共同的革命目标，走到一起来了",s:"《为人民服务》(1944年9月)",e:"不论出身、不论地域，只要目标一致，就能凝聚成强大的力量。这句话至今仍能鼓舞不同背景的人们团结协作。"},
{q:"下定决心，不怕牺牲，排除万难，去争取胜利",s:"《愚公移山》(1945年6月)",e:"这是《愚公移山》中最有力量的一段。面对看似不可逾越的困难，决心是第一位的。有了决心，不怕付出代价，再大的困难也能一步步攻克。"},
{q:"我们一定要坚持下去，一定要不断地工作，我们也会感动上帝的。这个上帝不是别人，就是全中国的人民大众",s:"《愚公移山》(1945年6月)",e:"人民就是上帝，持之以恒的行动终将得到人民的响应和支持。不要迷信外力，真正的力量来自人民。"},
{q:"我们的同志在困难的时候，要看到成绩，要看到光明，要提高我们的勇气",s:"《为人民服务》(1944年9月)",e:"在逆境中人的本能是看到问题和困难，而毛泽东提醒我们：要主动去寻找积极面。看到已经取得的成绩和前方的光明，勇气自然就来了。"},
{q:"长征是宣言书，长征是宣传队，长征是播种机",s:"《论反对日本帝国主义的策略》(1935年12月)",e:"长征不仅仅是军事行动——它向世界宣告了红军的不可战胜，向沿途人民撒下了革命的种子。任何伟大的事业都有类似的'长征'阶段。"},
{q:"读书是学习，使用也是学习，而且是更重要的学习",s:"《中国革命战争的战略问题》(1936年12月)",e:"知识只有用起来才有价值。很多人停留在'学'的阶段，但真正的成长来自'用'——在实践中检验、修正和深化理解。"},
{q:"世上无难事，只怕有心人",s:"《中国革命战争的战略问题》(1936年12月)",e:"老祖宗留下的智慧，被毛泽东在军事著作中引用。只要有决心、肯用心，入门不难，精通也可以做到。"},
{q:"将欲取之，必先与之",s:"《中国革命战争的战略问题》(1936年12月)",e:"老子道德经的智慧，被用在军事战略中。有时为了前进必须先退让，为了得到必须先付出。这是辩证法的生动体现。"},
{q:"一切反动派都是纸老虎",s:"《和美国记者安娜·路易斯·斯特朗的谈话》(1946年8月)",e:"这句名言震撼了全世界。表面上强大的敌人，从本质和长远来看都是虚弱的，因为他们脱离人民。真正强大的力量永远在人民一边。"},
{q:"前途是光明的，道路是曲折的",s:"《关于重庆谈判》(1945年10月)",e:"短短十个字，包含了最朴素也最深刻的人生哲理。要对未来抱有信心，同时也要对眼前的困难有充分预估。"},
{q:"一万年太久，只争朝夕",s:"《满江红·和郭沫若同志》(1963年1月)",e:"时不我待。与其坐着等待遥远的未来，不如抓住当下的每一刻。这句词鼓舞了几代中国人争分夺秒去奋斗。"},
{q:"雄关漫道真如铁，而今迈步从头越",s:"《忆秦娥·娄山关》(1935年2月)",e:"娄山关是红军长征中的一场恶战。先写关隘之险、战斗之烈，再写跨越之后的豪迈。无论曾经面对多么艰险的'雄关'，一旦跨越，就可以从新的起点再出发。"},
{q:"红军不怕远征难，万水千山只等闲",s:"《七律·长征》(1935年10月)",e:"长征之难超乎想象，但在红军眼中不过是'等闲'之事。这种举重若轻的气魄，来自坚定的信仰和崇高的目标。"},
{q:"不到长城非好汉",s:"《清平乐·六盘山》(1935年10月)",e:"长征翻越六盘山，意味着即将到达陕北根据地。'长城'既是地理坐标也是精神高度——不达目的不罢休，这才是真正的勇者。"},
{q:"数风流人物，还看今朝",s:"《沁园春·雪》(1936年2月)",e:"这首词的结尾气势磅礴。历史上的英雄都已过去，真正的风流人物在当下、在未来。这是对当代人的期许和鼓舞。"},
{q:"不管风吹浪打，胜似闲庭信步",s:"《水调歌头·游泳》(1956年6月)",e:"在长江游泳时写下的句子。面对大风大浪，不但不畏惧，反而比在庭院散步更自在。这种从容来自对自然和人生规律的把握。"},
{q:"为有牺牲多壮志，敢教日月换新天",s:"《七律·到韶山》(1959年6月)",e:"因为有无数先烈的牺牲，才激起了改天换地的雄心壮志。今天的成就来之不易，同时也要有继续变革的勇气。"},
{q:"牢骚太盛防肠断，风物长宜放眼量",s:"《七律·和柳亚子先生》(1949年4月)",e:"劝慰友人的名句。过多的牢骚只会伤害自己，不如放宽眼界看长远。人生中的不如意，放在更大的时空中往往不值一提。"},
{q:"春风杨柳万千条，六亿神州尽舜尧",s:"《七律二首·送瘟神》(1958年7月)",e:"当人民被组织起来、发挥出主动性时，人人都可以成为尧舜那样的圣贤。这是对群众创造力的最高赞誉。"},
{q:"天若有情天亦老，人间正道是沧桑",s:"《七律·人民解放军占领南京》(1949年4月)",e:"历史规律不以任何人的意志为转移。顺应历史潮流、走正道，虽然充满艰辛，但这是人类社会发展的必然。沧桑巨变本身就是人间正道。"},
{q:"可上九天揽月，可下五洋捉鳖",s:"《水调歌头·重上井冈山》(1965年5月)",e:"气魄极大的两句。人类可以登上月球，也可以潜入深海——没有什么是不可能的。这既是对科技进步的预言，也是对人主观能动性的礼赞。"},
{q:"天生一个仙人洞，无限风光在险峰",s:"《七绝·为李进同志题所摄庐山仙人洞照》(1961年9月)",e:"最美的风景在最险峻的地方。不经历艰难险阻，就看不到无限风光。这是对奋斗者的最好激励。"},
{q:"夺取全国胜利，这只是万里长征走完了第一步",s:"中共七届二中全会报告(1949年3月)",e:"革命胜利前夕的清醒告诫：不要被胜利冲昏头脑，更大的挑战在后面。任何时候取得了成绩，都只是一个新起点。"},
{q:"务必使同志们继续地保持谦虚、谨慎、不骄、不躁的作风",s:"中共七届二中全会报告(1949年3月)",e:"'两个务必'是进京赶考前的自我警醒，至今仍是做人做事的重要准则。成功时最危险的敌人就是骄傲和急躁。"},
{q:"实践、认识、再实践、再认识，这种形式，循环往复以至无穷",s:"《实践论》(1937年7月)",e:"认识不是一次性完成的，而是在实践和认识的反复循环中不断深化。做任何事情，都要在行动中学习，在学习中再行动。"},
{q:"事物发展的根本原因，不是在事物的外部而是在事物的内部",s:"《矛盾论》(1937年8月)",e:"遇到问题，首先要从自身找原因，而不是怪外部环境。内因是变化的根据，外因只是条件。"},
{q:"外因是变化的条件，内因是变化的根据，外因通过内因而起作用",s:"《矛盾论》(1937年8月)",e:"这是辩证法的经典命题。环境很重要，但决定性的因素始终在你自己。鸡蛋在适当温度下能孵出小鸡，但石头无论如何也孵不出。"},
{q:"自信人生二百年，会当水击三千里",s:"《七古·残句》(约1917年)",e:"青年毛泽东自励之句。豪情万丈，气吞山河——对自己的人生有充分信心，要像大鹏展翅一样驰骋三千里。"},
{q:"敌军围困万千重，我自岿然不动",s:"《西江月·井冈山》(1928年秋)",e:"黄洋界保卫战时的写照。在外界压力重重包围之中，保持内心的坚定与冷静。这种定力来自对信念的坚守。"},
{q:"踏遍青山人未老，风景这边独好",s:"《清平乐·会昌》(1934年夏)",e:"长征前夕，处境艰难，但诗人说：走过了无数青山，自己依然没有衰老，而眼前这片土地风景独好。积极乐观的革命浪漫主义。"},
{q:"宜将剩勇追穷寇，不可沽名学霸王",s:"《七律·人民解放军占领南京》(1949年4月)",e:"用项羽的典故告诫：不要像项羽那样因为沽名钓誉而放走刘邦。做事情要一鼓作气、不留后患。"},
{q:"世界是在进步的，前途是光明的，这个历史的总趋势任何人也改变不了",s:"《关于重庆谈判》(1945年10月)",e:"这是对历史规律的根本信念。无论眼前多少挫折，历史的大方向是向前的。保持这种信念，就不会被暂时的困难打倒。"},
{q:"失败是成功之母",s:"《中国革命战争的战略问题》(1936年12月)",e:"每一次失败都含有成功的种子。关键在于能否从失败中汲取教训。惧怕失败本身就是最大的失败。"},
{q:"越是困难的地方越是要去，这才是好同志",s:"《关于重庆谈判》(1945年10月)",e:"迎难而上，不逃避。困难的地方正是能做出贡献的地方，挑重担而不是拣轻活。"},
{q:"一张白纸，没有负担，好写最新最美的文字，好画最新最美的画图",s:"《介绍一个合作社》(1958年)",e:"落后和空白并不可怕，反而意味着没有历史包袱，可以从零开始，创造全新的、美好的东西。"},
{q:"自己动手，丰衣足食",s:"《组织起来》(1943年11月)",e:"自力更生，不等不靠。在封锁和困难中，只有依靠自己的双手才能真正解决问题。"},
{q:"枪杆子里面出政权",s:"《战争和战略问题》(1938年11月)",e:"在阶级社会中，没有武装力量就没有一切。和平不是靠祈求得来的，是靠力量和斗争争取的。"},
{q:"世界上的事情是复杂的，是由各方面的因素决定的。看问题要从各方面去看，不能只从单方面看",s:"《关于重庆谈判》(1945年10月)",e:"片面性是常见的思维陷阱。任何事情都有多面性，只有全面地、多角度地看，才能接近真相。"},
{q:"调查研究就像'十月怀胎'，解决问题就像'一朝分娩'",s:"《反对本本主义》(1930年5月)",e:"解决问题之前的调查过程，就像怀孕一样需要时间和耐心；而一旦调查充分，解决方案就如分娩一般水到渠成。"},
{q:"中国人死都不怕，还怕困难吗？",s:"《别了，司徒雷登》(1949年8月)",e:"连死的威胁都走过来了，还有什么样的困难不能克服？这是一种置之死地而后生的气概。"},
{q:"先把社会里谁是朋友、谁是对手看清楚，再决定怎样行动",s:"主题摘述自《中国社会各阶级的分析》(1925年12月)",e:"这篇文章强调，路线判断不能只凭激情，要先辨明各阶级的利益位置。找准依靠力量和同盟对象，行动才不会南辕北辙。"},
{q:"小块根据地能站住脚，不靠侥幸，靠的是群众、地形和敌人裂缝同时存在",s:"主题摘述自《中国的红色政权为什么能够存在？》(1928年10月)",e:"文章说明，局部革命力量之所以能坚持下来，是因为既有群众基础，又抓住了敌人内部矛盾和有利地理条件。任何局部突破都离不开整体环境判断。"},
{q:"队伍不能只会打仗，还要有政治目标、组织纪律和统一作风",s:"主题摘述自《关于纠正党内的错误思想》(1929年12月)",e:"这篇文章集中纠正单纯军事观点、极端民主化、个人主义和主观主义等问题，强调组织的战斗力来自共同目标与纪律约束。"},
{q:"经济工作不是革命的附属品，越在困难时越要会算账、会组织、会生产",s:"主题摘述自《必须注意经济工作》(1933年8月)",e:"在根据地建设中，财政、生产和供给并非小事。能不能把日子过稳、把资源组织好，直接决定事业能否持续。"},
{q:"分析农村，不能只看口号，要看土地、劳动和实际利益怎样分配",s:"主题摘述自《怎样分析农村阶级》(1933年10月)",e:"这类分析强调从现实经济关系出发识别不同群体的位置。判断谁受压迫、谁有余力、谁摇摆，必须落到具体生活条件上。"},
{q:"政策要落到柴米油盐，群众感受到好处，工作才有根",s:"主题摘述自《关心群众生活，注意工作方法》(1934年1月)",e:"文章提醒领导工作不能只停留在大目标上，盐米、住房、看病、耕牛等具体问题解决得怎样，直接决定群众是否真正支持。"},
{q:"统一战线不是喊出来的，要把最广大的力量真正组织进来",s:"主题摘述自《为争取千百万群众进入抗日民族统一战线而斗争》(1937年5月)",e:"关键不是少数人的激昂表态，而是能否把分散的人群变成共同奋斗的力量。越是大局任务，越依赖广泛动员。"},
{q:"看见问题却装作没看见，表面和气，最后往往会伤了整体",s:"主题摘述自《反对自由主义》(1937年9月)",e:"这篇文章反对把无原则的迁就当作团结。真正负责，不是回避矛盾，而是为了共同目标敢于指出问题、推动改正。"},
{q:"胜利很少来自速想速成，先看清长期条件，再安排阶段和节奏",s:"主题摘述自《论持久战》(1938年5月)",e:"文章的核心不只是对前景抱有信心，而是把敌我力量、国际环境、政治动员和战略阶段放在一起判断，避免盲目悲观或盲目乐观。"},
{q:"身处统一战线，也要保持自己的判断、组织和主动性",s:"主题摘述自《统一战线中的独立自主问题》(1938年11月)",e:"合作并不意味着放弃立场。只有保持独立思考和组织能力，合作才不会变成被动跟随。"},
{q:"政治路线如果没有清楚的宣传、组织和干部承接，很快就会走样",s:"主题摘述自《〈共产党人〉发刊词》(1939年10月)",e:"这篇文章强调党的建设、统一战线和武装斗争之间的联动关系。正确路线需要思想、组织与传播工具一起支撑。"},
{q:"真正的学习，不是背一套现成说法，而是用理论去解释眼前中国的问题",s:"主题摘述自《改造我们的学习》(1941年5月)",e:"文章集中批评主观主义和教条主义，强调学习要同调查研究、历史经验和现实问题结合起来，最终落脚到解决具体事情。"},
{q:"作风整顿不是做姿态，而是把主观主义、宗派主义和空话真正压下去",s:"主题摘述自《整顿党的作风》(1942年2月)",e:"文章要求从思想方法和组织生活上清理坏作风。作风问题看似抽象，最终都会变成工作中的低效、隔阂和误判。"},
{q:"文章和讲话如果空洞、套话连篇，再正确的意思也传不到人心里",s:"主题摘述自《反对党八股》(1942年2月)",e:"这篇文章反对脱离实际、脱离对象、语言僵硬的表达方式。说服人不是靠堆概念，而是靠事实、逻辑和能被听懂的话。"},
{q:"文艺不能飘在半空，它总要回应人们真实的生活、情绪和处境",s:"主题摘述自《在延安文艺座谈会上的讲话》(1942年5月)",e:"这篇讲话讨论文艺的服务对象与创作立场。核心不是压缩创作，而是强调作品要和现实社会发生联系。"},
{q:"做工作既要有普遍号召，也要先抓几个点做深做透",s:"主题摘述自《关于领导方法的若干问题》(1943年6月)",e:"文章提出一般和个别相结合、领导和群众相结合。光有大口号不够，必须先在局部取得经验，再推广到更大范围。"},
{q:"真正可贵的精神，是把别人的事业当成自己的责任来做",s:"主题摘述自《纪念白求恩》(1939年12月)",e:"这篇文章借白求恩的事迹强调无私、负责和精益求精。它提醒人们，职业精神和公共精神并不是分开的。"},
{q:"会打仗还不够，还得会组织生产、管理供给和改善生活",s:"主题摘述自《必须学会做经济工作》(1945年1月)",e:"文章强调，经济工作不是少数部门的事，而是关系到整体局面的基础工作。没有稳定的生产和供给，许多目标都难以持续。"},
{q:"胜利之后最容易犯的错，是把新的困难想得太简单",s:"主题摘述自《抗日战争胜利后的时局和我们的方针》(1945年8月)",e:"在局势转折点上，文章提醒人们保持清醒。大局向前时，更要分清表面机会与长期风险。"},
{q:"力量不在平均分散，而在关键时刻把优势集中到能决定结果的地方",s:"主题摘述自《集中优势兵力，各个歼灭敌人》(1946年9月)",e:"这篇文章强调，不是处处求强，而是集中力量打最有把握的一点。资源有限时，选择比蛮干更重要。"},
{q:"带班子的人，先要让一班人都动起来，而不是自己包办一切",s:"主题摘述自《党委会的工作方法》(1949年3月)",e:"文章把书记比作班长，强调分工、协同、通气和集体决策。领导力不只是个人能力，更是组织别人一起把事办成的能力。"},
{q:"新政权要站稳，既要有人民立场，也要有能保护大多数利益的制度安排",s:"主题摘述自《论人民民主专政》(1949年6月)",e:"文章讨论国家性质、人民立场和政权基础。核心在于用制度把多数人的利益、组织和行动能力稳定下来。"},
{q:"越是条件变好了，越要记得创业时那种克制、朴素和韧劲",s:"主题摘述自《永远保持艰苦奋斗的作风》(1949年10月)",e:"这篇文章的提醒很直接：环境改善后，人最容易松劲、讲排场、忘本色。艰苦奋斗首先是一种精神约束。"},
{q:"局面刚稳定时，不宜到处树敌，要先稳住秩序、分清主次",s:"主题摘述自《不要四面出击》(1950年6月)",e:"文章强调新局面下的策略节奏。不能把一切矛盾同时推到最尖锐，而要先抓主要问题，争取更多可团结的力量。"},
{q:"财政经济想转好，不能只靠激情推进，还要讲秩序、恢复和逐步扭转",s:"主题摘述自《为争取国家财政经济状况的基本好转而斗争》(1950年6月)",e:"这篇文章强调，恢复国民经济要有阶段安排，既反对无所作为，也反对脱离基础的急躁冒进。"},
{q:"建设国家不是单押一头，要把轻重、沿海内地、中央地方、国家个人都统筹起来",s:"主题摘述自《论十大关系》(1956年4月)",e:"文章的价值在于处理复杂关系。真正成熟的治理，不是简单站队，而是在多个张力之间求平衡、激活各方面积极性。"},
{q:"社会里有不同性质的矛盾，处理办法也不能一把尺子量到底",s:"主题摘述自《关于正确处理人民内部矛盾的问题》(1957年2月)",e:"这篇文章强调区分矛盾性质、反对简单化处理。很多问题如果方法不当，会把本可协调的事情推向对立。"},
{q:"做建设时要把大多数人的积极性都调动起来，不能把圈子越缩越小",s:"主题摘述自《关于正确处理人民内部矛盾的问题》(1957年2月)",e:"文中提出统筹兼顾、适当安排。办大事不能只服务少数环节，而要考虑更广人群的承受与参与。"},
{q:"节约不是权宜之计，而是资源有限时长期有效的工作方法",s:"主题摘述自《关于正确处理人民内部矛盾的问题》(1957年2月)",e:"文章把节约放到国家建设的长期条件里看。越是大规模建设，越要反对铺张、官僚和高消耗。"},
{q:"向外学习不等于照抄，真正的本事是把别人的长处转成自己的办法",s:"主题摘述自《论十大关系》(1956年4月)",e:"文章强调既要学习外国经验，也不能丢掉独立判断。照搬最省事，但往往最不适合自己的条件。"},
{q:"干部和群众之间越密切，很多看似棘手的问题越容易找到出路",s:"主题摘述自《坚持艰苦奋斗，密切联系群众》(1957年3月)",e:"这类讲话延续的是同一条工作线索：作风不是口号，而是能否深入现场、听见真实声音、减少隔膜。"},
{q:"事情起了变化时，最怕还是用昨天的眼光看今天的局势",s:"主题摘述自《事情正在起变化》(1957年5月)",e:"局势一变，旧判断可能立刻过时。文章提醒人们及时修正认识，既不要迟钝，也不要用情绪代替分析。"},
{q:"宣传工作的价值，不在声音更大，而在能不能把道理讲到人能接受的地方",s:"主题摘述自《在中国共产党全国宣传工作会议上的讲话》(1957年3月)",e:"这类论述强调宣传与教育要有对象感和方法感。只追求姿态，不关心效果，最终只会加重隔阂。"},
{q:"对不同意见，先分清是非和性质，再决定是争论、帮助还是限制",s:"主题摘述自《论十大关系》(1956年4月)",e:"文章在处理党和非党、是非关系时，强调既要坚持原则，也要给不同意见留下表达和纠正的空间。"},
{q:"坏事未必只能越变越坏，关键在于能不能从中找出教训、及时转向",s:"主题摘述自《关于正确处理人民内部矛盾的问题》(1957年2月)",e:"这篇文章强调矛盾和事件具有转化性。只要处理得当，受挫、冲突甚至乱子，也可能倒逼出改进。"},
];

const DIRECTORY_QUOTES = [
  {t:"井冈山的斗争",d:"1928年11月",q:"立足一地不是保守，而是为了积蓄力量、稳扎稳打",e:"这篇文章围绕根据地、武装和群众之间的关系展开，强调要在斗争中建设，而不是只求短期流动作战。"},
  {t:"我们的经济政策",d:"1934年1月",q:"政策如果不能让生产恢复、交换通畅，很多目标都会落空",e:"文章强调经济政策既要照顾基本民生，也要服务整体局面，不能只讲口号，不问资源和秩序。"},
  {t:"反对日本进攻的方针、办法和前途",d:"1937年7月",q:"判断大战略，既要看眼前压力，也要看抵抗是否能汇成全国力量",e:"这篇文章围绕全面抗战前夕的形势判断展开，强调在复杂威胁面前先统一认识、再统一行动。"},

function pickOne(){
  const recent=new Set(history.slice(-10));
  const candidates=QUOTES.filter((_,i)=>!recent.has(i));
  const pick=candidates[Math.random()*candidates.length|0];
  const idx=QUOTES.indexOf(pick);
  history.push(idx);
  if(history.length>50) history.shift();
  updateHistory();
  return {quote:pick,idx};
}

function updateHistory(){
  const h=document.getElementById('history');
  const items=history.slice(-8);
  h.innerHTML=items.map(i=>{
    const t=QUOTES[i].q.slice(0,15)+(QUOTES[i].q.length>15?'…':'');
    return `<span class="chip" title="${QUOTES[i].q.replace(/"/g,'&quot;')}">${t}</span>`;
  }).join('');
}

function multiDrawLayout(n,deckRect,actionRect){
  const viewport=window.visualViewport;
  const firstPositive=(...values)=>values.find(value=>value>0)||0;
  const vw=firstPositive(
    window.innerWidth || 0,
    document.documentElement.clientWidth,
    document.body ? document.body.clientWidth : 0,
    viewport ? Math.round(viewport.width) : 0,
    document.body ? Math.round(document.body.getBoundingClientRect().width) : 0,
    Math.round(document.documentElement.getBoundingClientRect().width),
    screen.availWidth || 0,
    screen.width || 0,
  );
  const vh=firstPositive(
    window.innerHeight || 0,
    document.documentElement.clientHeight,
    document.body ? document.body.clientHeight : 0,
    viewport ? Math.round(viewport.height) : 0,
    document.body ? Math.round(document.body.getBoundingClientRect().height) : 0,
    Math.round(document.documentElement.getBoundingClientRect().height),
    screen.availHeight || 0,
    screen.height || 0,
  );
  const baseW=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-w'))||280;
  const baseH=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-h'))||400;
  const ratio=baseW/baseH;
  const compact=vw<700;
  const sidePadding=compact?16:28;
  const spreadFactor=compact?0.28:0.42;
  const maxWidth=vw-sidePadding*2;
  const cardW=Math.min(baseW,maxWidth/(1+spreadFactor*(n-1)));
  const cardH=cardW/ratio;
  const step=cardW*spreadFactor;
  const centerX=vw/2;
  const preferredCenterY=deckRect?deckRect.top+deckRect.height*(compact?0.28:0.3):vh*0.32;
  const safeBottom=actionRect?actionRect.top-18:vh-24;
  const edgeDrop=Math.ceil(cardH*(compact?0.02:0.03));
  const centerY=Math.max(
    cardH/2+22,
    Math.min(preferredCenterY,safeBottom-cardH/2-edgeDrop)
  );
  const positions=[];
  const middle=(n-1)/2;

  for(let index=0;index<n;index++){
    const offset=index-middle;
    const depth=Math.abs(offset);
    const rot=offset*(compact?3.5:4.5);
    const y=centerY+depth*edgeDrop;
    positions.push({
      x:centerX+offset*step,
      y,
      rot,
      w:cardW,
      h:cardH,
      z:20-depth*2+(offset===0?1:0),
      focusLift:compact?18:22,
      index,
    });
  }

  return positions;
}

function fanTransform(state,focused=false){
  const lift=focused?state.focusLift:0;
  const rot=focused?state.rot*0.3:state.rot;
  return `translate(-50%, calc(-50% - ${lift}px)) rotate(${rot}deg)`;
}

function attachFanCardInteraction(card,state){
  const apply=(focused)=>{
    card.style.zIndex=String(focused?60:state.z);
    card.style.transform=fanTransform(state,focused);
  };

  card.addEventListener('mouseenter',()=>apply(true));
  card.addEventListener('mouseleave',()=>apply(false));
  card.addEventListener('focus',()=>apply(true));
  card.addEventListener('blur',()=>apply(false));
}

function commitAnimatedLayout(element, applyFinalState){
  // Force the browser to commit the start state before transitioning to the final one.
  void element.offsetWidth;
  requestAnimationFrame(()=>{
    requestAnimationFrame(applyFinalState);
  });
}

function drawOne(){
  if(busy)return;busy=true;
  const btn=document.getElementById('mainBtn');btn.disabled=true;
  const deck=document.getElementById('deck'),dr=deck.getBoundingClientRect();
  const container=document.getElementById('drawnCards');
  const {quote}=pickOne();

  // Clear old cards
  container.querySelectorAll('.dc').forEach(c=>{
    c.style.transition='all .4s ease-in';
    c.style.opacity='0';c.style.transform='scale(0.8)';
    setTimeout(()=>c.remove(),400);
  });

  const card=buildCard(quote);
  // Start position at deck
  card.style.transition='none';
  card.style.top=(dr.top+dr.height/2)+'px';
  card.style.left=(dr.left+dr.width/2)+'px';
  card.style.transform='translate(-50%,-50%) scale(0.5)';
  container.appendChild(card);

  // Hide deck
  deck.style.transition='opacity .4s';deck.style.opacity='0';
  spawnFromDeck(dr);

  // Animate to center
  commitAnimatedLayout(card,()=>{
    card.classList.add('visible');
    card.style.transition='all .5s cubic-bezier(.25,.46,.45,.94)';
    card.style.top='50%';card.style.left='50%';
    card.style.transform='translate(-50%,-50%) scale(1)';
  });

  setTimeout(()=>{card.classList.add('flipped');spawnConfetti(50)},650);

  setTimeout(()=>{
    deck.style.transition='opacity .6s .3s';deck.style.opacity='1';
    btn.disabled=false;busy=false;
  },1400);
}

function drawFive(){
  if(busy)return;busy=true;
  const mainBtn=document.getElementById('mainBtn');
  mainBtn.disabled=true;
  const deck=document.getElementById('deck'),dr=deck.getBoundingClientRect();
  const container=document.getElementById('drawnCards');
  const actionRect=mainBtn.getBoundingClientRect();

  // Clear old
  container.querySelectorAll('.dc').forEach(c=>{
    c.style.transition='all .4s ease-in';
    c.style.opacity='0';c.style.transform='scale(0.8)';
    setTimeout(()=>c.remove(),400);
  });

  const quotes=[];
  for(let i=0;i<5;i++) quotes.push(pickOne().quote);
  const layout=multiDrawLayout(5,dr,actionRect);

  deck.style.opacity='0';
  spawnFromDeck(dr);
  spawnConfetti(100);

  quotes.forEach((q,i)=>{
    setTimeout(()=>{
      const card=buildCard(q);
      card.style.width=layout[i].w+'px';
      card.style.height=layout[i].h+'px';
      card.style.zIndex=String(layout[i].z);
      card.style.transition='none';
      card.style.top=(dr.top+dr.height/2)+'px';
      card.style.left=(dr.left+dr.width/2)+'px';
      card.style.transform='translate(-50%,-50%) scale(0.4)';
      container.appendChild(card);
      attachFanCardInteraction(card,layout[i]);
      spawnFromDeck(dr);

      commitAnimatedLayout(card,()=>{
        card.classList.add('visible');
        card.style.transition='all .6s cubic-bezier(.25,.46,.45,.94)';
        card.style.top=layout[i].y+'px';
        card.style.left=layout[i].x+'px';
        card.style.transform=fanTransform(layout[i]);
      });

      setTimeout(()=>{
        card.classList.add('flipped');
        card.style.zIndex=String(layout[i].z);
        card.style.transform=fanTransform(layout[i]);
      },700+i*80);
    },i*250);
  });

  setTimeout(()=>{
    deck.style.transition='opacity .6s .3s';deck.style.opacity='1';
    mainBtn.disabled=false;busy=false;
  },3200);
}

function spawnFromDeck(dr){
  const cx=dr.left+dr.width/2,cy=dr.top+dr.height/2;
  const colors=['#d4a017','#f0d060','#c62828','#e8dcc8'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=2+Math.random()*6,a=Math.random()*Math.PI*2,s=60+Math.random()*150;
    const dx=Math.cos(a)*s,dy=Math.sin(a)*s-Math.random()*80;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[Math.random()*colors.length|0]};border-radius:50%;box-shadow:0 0 ${sz*2}px ${colors[Math.random()*colors.length|0]};--dx:${dx}px;--dy:${dy}px;animation:burst .9s ease-out forwards`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function spawnConfetti(n){
  const colors=['#d4a017','#c62828','#f0d060','#e8dcc8','#ff6f00','#cc3333'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='confetti';
    const s=5+Math.random()*8,x=Math.random()*100,d=2+Math.random()*3,delay=Math.random()*.8;
    c.style.cssText=`left:${x}%;top:-20px;width:${s}px;height:${s*1.4}px;background:${colors[Math.random()*colors.length|0]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confettiFall ${d}s ease-in forwards;animation-delay:${delay}s`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),(d+delay)*1000+200);
  }
}

// Background canvas
(function(){
  const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
  let w,h,pts=[];
  function rs(){w=cv.width=window.innerWidth;h=cv.height=window.innerHeight}
  rs();window.addEventListener('resize',rs);
  for(let i=0;i<60;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:.5+Math.random()*1.5,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3});
  function dr(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      const a=.3+.1*Math.sin(Date.now()*.001+p.x*.01);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,160,23,${a})`;ctx.fill();
    });
    requestAnimationFrame(dr);
  }
  dr();
})();

document.addEventListener('DOMContentLoaded',()=>{
  deckEl=document.getElementById('deck');
  mainBtn=document.getElementById('mainBtn');
  fillPortraitSlots();
  updateQuoteCount();
  updateHistory();
});
</script>
